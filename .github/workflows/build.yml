name: Build & Package

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  SWIFT_BUILD_FLAGS: -c release

jobs:
  build_and_test:
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Cache build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .build
            .cache
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-swift-

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.1"

      - name: Set build env
        run: echo "CLANG_MODULE_CACHE_PATH=$RUNNER_TEMP/clang-module-cache" >> "$GITHUB_ENV"

      - name: Show SDK and toolchain
        run: |
          xcrun --sdk macosx --show-sdk-path
          xcrun --sdk macosx --show-sdk-version
          swift --version

      - name: Build release binary
        run: swift build $SWIFT_BUILD_FLAGS
        env:
          CLANG_MODULE_CACHE_PATH: ${{ env.CLANG_MODULE_CACHE_PATH }}

      - name: Run tests
        run: swift test
        env:
          CLANG_MODULE_CACHE_PATH: ${{ env.CLANG_MODULE_CACHE_PATH }}

      - name: Verify packaged app signing layout
        run: |
          ./scripts/package-dmg.sh -c release -n LuxaforPresence-ci
          INFO_PLIST=dist/LuxaforPresence.app/Contents/Info.plist
          test "$(plutil -extract CFBundleIdentifier raw -o - "$INFO_PLIST")" = "com.jdegregorio.LuxaforPresence"
          test "$(plutil -extract CFBundleExecutable raw -o - "$INFO_PLIST")" = "LuxaforPresence"
          test "$(plutil -extract CFBundlePackageType raw -o - "$INFO_PLIST")" = "APPL"
          test "$(plutil -extract LSMinimumSystemVersion raw -o - "$INFO_PLIST")" = "13.0"
          test "$(plutil -extract LSUIElement raw -o - "$INFO_PLIST")" = "true"
          plutil -extract NSMicrophoneUsageDescription raw -o - "$INFO_PLIST" >/dev/null
          for key in NSCameraUsageDescription NSCameraUseContinuityCameraDeviceType NSCalendarsUsageDescription NSAppleEventsUsageDescription; do
            if /usr/libexec/PlistBuddy -c "Print :$key" "$INFO_PLIST" >/dev/null 2>&1; then
              echo "Unexpected packaged privacy key: $key" >&2
              exit 1
            fi
          done
          test -L dist/dmg-src/Applications
          codesign --verify --deep --strict --verbose=2 dist/LuxaforPresence.app
          ENTITLEMENTS_OUTPUT="$(codesign -d --entitlements - dist/LuxaforPresence.app 2>&1)"
          grep -q 'com.apple.security.device.audio-input' <<<"$ENTITLEMENTS_OUTPUT"
          if grep -q 'com.apple.security.device.camera' <<<"$ENTITLEMENTS_OUTPUT"; then
            echo "Packaged app unexpectedly contains the camera entitlement" >&2
            exit 1
          fi
        env:
          CLANG_MODULE_CACHE_PATH: ${{ env.CLANG_MODULE_CACHE_PATH }}

  build_dmg:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build_and_test
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Cache build artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            .build
            .cache
          key: ${{ runner.os }}-swift-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-swift-

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90 # v1.7.0
        with:
          xcode-version: "26.1"

      - name: Set build env
        run: echo "CLANG_MODULE_CACHE_PATH=$RUNNER_TEMP/clang-module-cache" >> "$GITHUB_ENV"

      - name: Build release binary
        run: swift build $SWIFT_BUILD_FLAGS
        env:
          CLANG_MODULE_CACHE_PATH: ${{ env.CLANG_MODULE_CACHE_PATH }}

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          BUILD_CERTIFICATE_PASSWORD: ${{ secrets.BUILD_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          : "${BUILD_CERTIFICATE_BASE64:?Missing BUILD_CERTIFICATE_BASE64 secret}"
          : "${BUILD_CERTIFICATE_PASSWORD:?Missing BUILD_CERTIFICATE_PASSWORD secret}"
          : "${KEYCHAIN_PASSWORD:?Missing KEYCHAIN_PASSWORD secret}"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/release-signing.keychain-db"
          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$BUILD_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          echo "RELEASE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure notarization credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
        run: |
          : "${NOTARY_APPLE_ID:?Missing NOTARY_APPLE_ID secret}"
          : "${NOTARY_TEAM_ID:?Missing NOTARY_TEAM_ID secret}"
          : "${NOTARY_APP_PASSWORD:?Missing NOTARY_APP_PASSWORD secret}"
          xcrun notarytool store-credentials LuxaforPresence-CI \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_APP_PASSWORD"

      - name: Sign, notarize, and package dmg
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NOTARY_PROFILE: LuxaforPresence-CI
        run: ./scripts/release-dmg.sh -c release -n LuxaforPresence

      - name: Clean up signing keychain
        if: always()
        run: |
          if [[ -n "${RELEASE_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$RELEASE_KEYCHAIN_PATH" || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: LuxaforPresence-${{ github.ref_name }}
          path: dist/LuxaforPresence.dmg
